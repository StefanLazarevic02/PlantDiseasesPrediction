dataset:
  image_size: 256
  input_size: 224
  mean:
  - 0.485
  - 0.456
  - 0.406
  name: New Plant Diseases Dataset
  num_classes: 38
  root_dir: data/New Plant Diseases Dataset(Augmented)/New Plant Diseases Dataset(Augmented)
  std:
  - 0.229
  - 0.224
  - 0.225
  test_dir: test
  train_dir: train
  valid_dir: valid

preprocessing:
  center_crop: null
  normalize: true
  resize: 224
  use_dataset_stats: true

augmentation:
  enabled: true
  light:
    brightness_limit: 0.1
    contrast_limit: 0.1
    horizontal_flip_p: 0.5
    rotation_limit: 15
    vertical_flip_p: 0.0
  medium:
    blur_limit: 3
    brightness_limit: 0.2
    contrast_limit: 0.2
    horizontal_flip_p: 0.5
    hue_shift_limit: 10
    noise_var_limit:
    - 10.0
    - 30.0
    rotation_limit: 30
    sat_shift_limit: 20
    vertical_flip_p: 0.1
  policy: medium
  strong:
    blur_limit: 5
    brightness_limit: 0.3
    coarse_dropout_max_height: 24
    coarse_dropout_max_holes: 8
    coarse_dropout_max_width: 24
    contrast_limit: 0.3
    elastic_alpha: 120
    elastic_sigma: 6
    horizontal_flip_p: 0.5
    hue_shift_limit: 15
    noise_var_limit:
    - 10.0
    - 50.0
    rotation_limit: 45
    sat_shift_limit: 30
    scale_limit: 0.2
    shift_limit: 0.1
    vertical_flip_p: 0.2

dataloader:
  batch_size: 64
  num_workers: 2
  persistent_workers: true
  pin_memory: true
  prefetch_factor: 2

training:
  epochs: 20
  learning_rate: 0.001
  model_name: efficientnet_b0
  weight_decay: 0.0001